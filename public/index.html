<!-- public/index.html -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SantanaEpiControl - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <!-- CSS Customizado -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-success bg-opacity-10">
    <div class="container-fluid vh-100">
        <div class="row h-100">
            <!-- Coluna da esquerda com imagem (opcional) -->
            <div class="col-md-6 d-none d-md-flex align-items-center justify-content-center bg-success bg-opacity-25">
                <div class="text-center">
                    <i class="bi bi-shield-lock-fill text-success" style="font-size: 8rem;"></i>
                    <h2 class="mt-4 text-success">SantanaEpiControl</h2>
                    <p class="text-muted">Controle de EPIs Profissional</p>
                </div>
            </div>
            
            <!-- Coluna da direita com formulário de login -->
            <div class="col-md-6 d-flex align-items-center justify-content-center">
                <div class="card shadow-lg" style="width: 100%; max-width: 400px;">
                    <div class="card-body p-5">
                        <!-- Logo/Ícone do sistema -->
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                            <h3 class="mt-2 text-success">SantanaEpiControl</h3>
                            <p class="text-muted">Acesse sua conta</p>
                        </div>
                        
                        <!-- Formulário de login -->
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="matricula" class="form-label">Matrícula</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-success text-white">
                                        <i class="bi bi-person-badge"></i>
                                    </span>
                                    <input 
                                        type="text" 
                                        class="form-control" 
                                        id="matricula" 
                                        placeholder="Digite sua matrícula"
                                        required
                                    >
                                </div>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-success text-white">
                                        <i class="bi bi-key"></i>
                                    </span>
                                    <input 
                                        type="password" 
                                        class="form-control" 
                                        id="password" 
                                        placeholder="Digite sua senha"
                                        required
                                    >
                                </div>
                            </div>
                            
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-success btn-lg" id="loginBtn">
                                    <span class="spinner-border spinner-border-sm d-none" id="loginSpinner" role="status"></span>
                                    <span id="loginText">Entrar</span>
                                </button>
                            </div>
                            
                            <div class="text-center">
                                <a href="#" class="text-success text-decoration-none">
                                    <small>Esqueceu sua senha?</small>
                                </a>
                            </div>
                        </form>
                        
                        <!-- Mensagens de erro/sucesso -->
                        <div id="messageAlert" class="alert mt-3 d-none" role="alert"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Script customizado -->
    <script src="/js/script.js"></script>
</body>
</html>

<!doctype html>
<html lang="pt-br" data-bs-theme="auto">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SantanaEpiControl — Login</title>
  <meta name="description" content="Acesse o sistema SantanaEpiControl">
  <link rel="icon" href="favicon.ico">

  <!-- Bootstrap 5 via CDN -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >

  <!-- Estilos customizados -->
  <style>
    :root{
      --brand: #2e7d32;              /* Verde principal */
      --brand-strong: #1b5e20;       /* Verde escuro */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 10% 10%, rgba(46, 125, 50, .12), transparent 40%),
                  radial-gradient(1000px 500px at 90% 90%, rgba(46, 125, 50, .10), transparent 40%),
                  linear-gradient(180deg, rgba(0,0,0,.03), transparent 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(0,0,0,.06);
      box-shadow:
        0 10px 25px rgba(0,0,0,.08),
        0 1px 2px rgba(0,0,0,.06);
      border-radius: 16px;
      overflow: hidden;
    }

    .brand-bar {
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: #fff;
    }

    .brand-badge {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      background: rgba(255,255,255,.18);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      letter-spacing: .5px;
      border: 1px solid rgba(255,255,255,.22);
      user-select: none;
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: .3px;
      margin: 0;
    }

    .form-floating>.form-control:focus,
    .form-floating>.form-control:not(:placeholder-shown) {
      padding-top: 1.625rem;
      padding-bottom: .625rem;
    }

    .btn-brand {
      background: var(--brand);
      border-color: var(--brand);
    }
    .btn-brand:hover,
    .btn-brand:focus {
      background: var(--brand-strong);
      border-color: var(--brand-strong);
    }

    .footer-links a {
      text-decoration: none;
    }

    /* Aumenta o alvo de toque do checkbox */
    .form-check-input {
      width: 1.2rem;
      height: 1.2rem;
    }

    @media (prefers-color-scheme: dark) {
      .login-card {
        border-color: rgba(255,255,255,.08);
        box-shadow:
          0 10px 25px rgba(0,0,0,.45),
          0 1px 2px rgba(0,0,0,.3);
      }
    }
  </style>
</head>
<body>

  <main class="login-card bg-body">
    <!-- Topo / Marca -->
    <section class="brand-bar p-4">
      <div class="d-flex align-items-center gap-3">
        <div class="brand-badge" aria-hidden="true">SE</div>
        <div class="text-white">
          <h1 class="brand-title h4 mb-1">SantanaEpiControl</h1>
          <p class="mb-0 opacity-75">Controle e rastreabilidade de EPIs</p>
        </div>
      </div>
    </section>

    <!-- Formulário -->
    <section class="p-4 p-md-4">
      <!-- Avisos de validação (exemplo) -->
      <div id="alertBox" class="alert alert-danger d-none" role="alert" aria-live="polite">
        Verifique os campos destacados.
      </div>

      <form id="loginForm" class="needs-validation" novalidate method="post" action="/auth/login">
        <!-- Placeholder para CSRF -->
        <!-- <input type="hidden" name="__RequestVerificationToken" value="{{ csrf_token }}"> -->

        <div class="form-floating mb-3">
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="nome@exemplo.com"
            autocomplete="username"
            required
          >
          <label for="email">E-mail</label>
          <div class="invalid-feedback">
            Informe um e-mail válido.
          </div>
        </div>

        <div class="form-floating mb-2 position-relative">
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Sua senha"
            autocomplete="current-password"
            required
            minlength="6"
          >
          <label for="password">Senha</label>
          <button
            type="button"
            class="btn btn-sm btn-outline-secondary position-absolute top-50 end-0 translate-middle-y me-2"
            id="togglePassword"
            aria-label="Mostrar ou ocultar senha"
          >
            <span id="eyeIcon" aria-hidden="true">👁️</span>
          </button>
          <div class="invalid-feedback">
            A senha deve ter pelo menos 6 caracteres.
          </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" value="true" id="remember" name="remember">
            <label class="form-check-label" for="remember">
              Manter conectado
            </label>
          </div>
          <div>
            <a href="/auth/forgot-password" class="link-secondary">Esqueci minha senha</a>
          </div>
        </div>

        <button class="btn btn-brand w-100 btn-lg" type="submit">
          Entrar
        </button>

        <div class="text-center mt-3">
          <small class="text-body-secondary">
            Não tem conta?
            <a href="/auth/register">Criar acesso</a>
          </small>
        </div>
      </form>
    </section>

    <!-- Rodapé / links menores -->
    <section class="px-4 pb-4">
      <div class="d-flex flex-wrap justify-content-between footer-links small text-body-secondary">
        <span>&copy; <span id="year"></span> SantanaEpiControl</span>
        <div class="d-flex gap-3">
          <a href="/termos">Termos</a>
          <a href="/privacidade">Privacidade</a>
          <a href="/contato">Contato</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Bootstrap JS (opcional, para alguns componentes) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <!-- Script: validação, toggle de senha, prevenção de múltiplos envios -->
  <script>
    // Ano dinâmico
    document.getElementById('year').textContent = new Date().getFullYear();

    // Mostrar/ocultar senha
    const toggleBtn = document.getElementById('togglePassword');
    const pwdInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    toggleBtn.addEventListener('click', () => {
      const isPwd = pwdInput.type === 'password';
      pwdInput.type = isPwd ? 'text' : 'password';
      eyeIcon.textContent = isPwd ? '🙈' : '👁️';
      toggleBtn.setAttribute('aria-pressed', String(isPwd));
    });

    // Validação Bootstrap + alerta agregador
    (function () {
      'use strict';

      const form = document.getElementById('loginForm');
      const alertBox = document.getElementById('alertBox');

      form.addEventListener('submit', function (event) {
        // Limpa alerta
        alertBox.classList.add('d-none');

        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
          form.classList.add('was-validated');
          alertBox.classList.remove('d-none');
          return;
        }

        // (Opcional) desabilitar botão para evitar duplo envio
        const submitBtn = form.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Entrando...';

        // Aqui você pode deixar o submit seguir normalmente
        // ou prevenir e fazer fetch/AJAX.
        // event.preventDefault();
        // fetch('/auth/login', { method: 'POST', body: new FormData(form) })
        //   .then(...)
        //   .catch(...)
        //   .finally(() => { submitBtn.disabled = false; submitBtn.textContent = 'Entrar'; });
      }, false);
    })();
  </script>
</body>
</html>
